[global/wm]

margin-bottom = 0
margin-top = 0

include-file = ../../config/system.ini
include-file = modules.ini

[color]
bg = #000000
fg = #ffffff
mb = #000000

red = #ff002f
pink = #FF0677
purple = #a200ff
blue = #0051ff
blue-arch = #0A9CF5
cyan = #00d9ff
teal = #00dac4
green = #00ff00
lime = #B9C244
yellow = #fbff00
amber = #ffc83e
orange = #ff5500
brown = #afa09a
grey = #8C8C8C
indigo = #6C77BB
blue-gray = #6D8895

[bar/emi-bar]
monitor = ${env:MONITOR:}
monitor-strict = false
override-redirect = false

bottom = false
fixed-center = true

width = 99%
height = 26

offset-x = 0.5%
offset-y = 8

background = ${color.bg}
foreground = ${color.fg}

radius = 4.0

line-size = 2
line-color = ${color.bg}

border-size = 8px
border-color = ${color.bg}

padding = 1

module-margin-left = 0
module-margin-right = 0

; Text
font-0 = "JetBrainsMono:style=Bold:pixelsize=10;3"
; Icons
font-1 = "Font Awesome 6 Free Solid:size=10;3"
font-2 = "Material Design Icons Desktop:size=11;3"
font-3 = "Material Design Icons Desktop:size=12;4"
; Glyphs
font-4 = "MesloLGS NF:style=Regular:pixelsize=17;4"
;dpi = 98

;Modules availables but not active:
;		brightness		weather		xkeyboard
modules-left = launcher dots mplayer sep mpd sep cpu_bar sep memory_bar
modules-center = date sep bspwm
modules-right =  tray sep mpd_control sep updates sep bluetooth sep battery sep network sep pulseaudio dots power

separator =
dim-value = 1.0

;;locale = es_MX.UTF-8

wm-restack = bspwm
enable-ipc = true

cursor-click = pointer
cursor-scroll = true

[settings]

screenchange-reload = false

compositing-background = source
compositing-foreground = over
compositing-overline = over
compositing-underline = over
compositing-border = over

pseudo-transparency = false
